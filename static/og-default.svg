<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0920"/>
      <stop offset="100%" stop-color="#160c30"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="btngrad" x1="80" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" result="blur"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Purple glow blobs -->
  <ellipse cx="200" cy="315" rx="280" ry="220" fill="#7c3aed" opacity="0.10" filter="url(#glow)"/>
  <ellipse cx="1050" cy="200" rx="200" ry="160" fill="#a78bfa" opacity="0.07" filter="url(#glow)"/>

  <!-- Left accent line -->
  <rect x="80" y="160" width="5" height="140" rx="2.5" fill="#7c3aed"/>

  <!-- Eyebrow label -->
  <rect x="100" y="156" width="238" height="32" rx="16" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
  <text x="219" y="177" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle" letter-spacing="2.5">AI TEXT HUMANIZER</text>

  <!-- Main headline -->
  <text x="100" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#f5f3ff" letter-spacing="-1.5">Make AI Writing</text>
  <text x="100" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="-1.5">
    <tspan fill="#c4b5fd">Undetectable</tspan><tspan fill="#f5f3ff">.</tspan>
  </text>

  <!-- Subline -->
  <text x="100" y="400" font-family="'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#a5b4fc" font-weight="400" letter-spacing="0.2">Bypass GPTZero · Turnitin · Originality.ai in seconds</text>

  <!-- CTA Button -->
  <rect x="100" y="440" width="248" height="56" rx="28" fill="url(#btngrad)"/>
  <text x="224" y="474" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.3">Try Free — No Sign Up</text>

  <!-- Divider -->
  <line x1="100" y1="528" x2="1120" y2="528" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Trust badges -->
  <text x="100" y="562" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6d6d8a" font-weight="400">✓ Free to try</text>
  <text x="240" y="562" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6d6d8a" font-weight="400">✓ No account needed</text>
  <text x="430" y="562" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6d6d8a" font-weight="400">✓ Students &amp; professionals</text>

  <!-- Domain -->
  <text x="1120" y="562" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#4b4b6b" text-anchor="end" font-weight="400">humanizeaiwrite.com</text>
</svg>
