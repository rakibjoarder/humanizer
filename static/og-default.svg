<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a0f35"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="#7c3aed" opacity="0.12" filter="url(#blur)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="120" rx="2" fill="url(#brand)"/>

  <!-- Badge -->
  <rect x="104" y="174" width="200" height="28" rx="14" fill="#7c3aed" opacity="0.2"/>
  <rect x="104" y="174" width="200" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <text x="204" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="2">AI HUMANIZER</text>

  <!-- Main headline -->
  <text x="104" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="#ffffff" letter-spacing="-1">Make AI Text</text>
  <text x="104" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="url(#brand)" letter-spacing="-1">Undetectable.</text>

  <!-- Subheading -->
  <text x="104" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a0a0b8" font-weight="400">Bypass GPTZero · Turnitin · Originality.ai — instantly.</text>

  <!-- Divider -->
  <line x1="104" y1="430" x2="1120" y2="430" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Feature pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="104" y="454" width="190" height="40" rx="20" fill="#1e1535" stroke="#3b2d6e" stroke-width="1"/>
    <circle cx="130" cy="474" r="6" fill="#22c55e"/>
    <text x="146" y="479" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db" font-weight="500">Free to try</text>

    <!-- Pill 2 -->
    <rect x="310" y="454" width="220" height="40" rx="20" fill="#1e1535" stroke="#3b2d6e" stroke-width="1"/>
    <circle cx="336" cy="474" r="6" fill="#a78bfa"/>
    <text x="352" y="479" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db" font-weight="500">No account needed</text>

    <!-- Pill 3 -->
    <rect x="546" y="454" width="210" height="40" rx="20" fill="#1e1535" stroke="#3b2d6e" stroke-width="1"/>
    <circle cx="572" cy="474" r="6" fill="#f59e0b"/>
    <text x="588" y="479" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db" font-weight="500">Students &amp; writers</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6b7280" text-anchor="end" font-weight="400">humanizeaiwrite.com</text>
</svg>
