<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				try {
					if (localStorage.getItem('hai-theme') === 'light') {
						document.documentElement.setAttribute('data-theme', 'light');
					}
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="/assets/icon-dark.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Fallback meta — overridden per-page by SEO.svelte -->
		<meta name="description" content="Humanize AI-generated text and bypass AI detectors instantly. Free AI detector included." />
		<meta property="og:site_name" content="HumanizeAIWrite" />
		<meta property="og:image" content="https://humanizeaiwrite.com/_vercel/image?url=%2Fog-default.svg&w=1200&q=100" />
		<meta name="twitter:card" content="summary_large_image" />
		<!-- Performance hints -->
		<link rel="dns-prefetch" href="https://api.stripe.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
