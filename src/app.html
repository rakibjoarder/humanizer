<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				try {
					if (localStorage.getItem('hai-theme') === 'light') {
						document.documentElement.setAttribute('data-theme', 'light');
					}
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="/assets/icon-dark.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
